<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akio Ohmoto</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      font-family: 'Aileron', serif;
    }

    .image-container {
      display: flex;
      margin-left: 30px;
      gap: 0px; /* Space between images */
    }

    .image-container img {
      width: 75px;
      height: 75px; /* Ensures square dimensions */
      object-fit: cover; /* Keeps the image aspect ratio */
      border: 2px solid #fff; /* Optional border */
      border-radius: 5px; /* Optional rounded corners */
    }

    canvas {
      flex-grow: 1; /* Makes the canvas fill available space */
    }
    
    .image-profile {
        width: 300px;
        transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .image-profile:hover {
        transform: scale(1.2); /* Enlarge the image */
        box-shadow: 0 20px 30px rgba(255, 255, 255, 0.7); /* Glow effect */
    }
    
    /* Navigation bar styles */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #111111;
      padding: 10px 20px;
      color: rgb(226, 226, 226);
    }

    nav h1 {
      margin-left: 30px;
    }

    nav ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      text-decoration: none;
      color: white;
      font-size: 18px;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

    /* Ensures the image is completely to the right */
    .image-right {
      position: absolute; /* Positioned relative to the body */
      top: 0px; /* Adjust as needed */
      right: 0; /* Fully aligns to the right */
      max-width: 50%; /* Adjust width to control size */
      margin: 0; /* Removes extra spacing */
    }

    /* Content spacing */
    h2 {
      margin-left: 50px;
    }

    h3 {
      margin-left: 50px;
    }

    p {
      margin-left: 50px;
    }
  </style>
</head>
<body>
  <nav>
    <h1 href="home.html" >akioohmoto.</h1>
    <ul>
      <li><a href="home.html">home</a></li>
      <li><a href="about.html">about</a></li>
      <li><a href="#contact">contact</a></li>
      <li><a href="https://sixtysecondsflat.wordpress.com/">blog</a></li>
    </ul>
  </nav>
  <h2>about me.</h2>
  <p>Hi there! My name is Akio, an aspiring brand marketing manager and a creative thinker.</p>

  <h3>skills</h3>
  <div class="image-container">
    <img src="images/html.png" class="image-profile" alt="HTML">
    <img src="images/css.png" class="image-profile" alt="CSS">
    <img src="images/js.png" class="image-profile" alt="JavaScript">
    <img src="images/java.png" class="image-profile" alt="Java">
    <img src="images/python.png" class="image-profile" lt="Python">
    <img src="images/canva.png" class="image-profile" alt="canva">
    <img src="images/semrush.png" class="image-profile" alt="semrush">
    <img src="images/photoshop.png" class="image-profile" lt="photoshop">
  </div>

  <!-- Image fully to the right -->
  <img src="images/aboutme.png" alt="About Me" class="image-right" class="image-profile">
</body>
</html>
